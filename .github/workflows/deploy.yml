name: Deploy talks to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'talks/**'
  workflow_dispatch:
    inputs:
      folder:
        description: 'Путь папки доклада для ручного деплоя (например talks/BC-112-DOCKER-8-POMAZKOV). Пусто = задеплоить все доклады'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  detect-changes:
    name: Определить изменённые папки
    runs-on: ubuntu-latest
    outputs:
      folders: ${{ steps.detect.outputs.folders }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: git diff → список папок BC-*
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.folder }}"
            if [ -n "$INPUT" ]; then
              CHANGED="$INPUT"
            else
              # Все доклады (папки BC-* на любой глубине внутри talks/)
              CHANGED=$(find talks -type d -name 'BC-*' | sort -u)
            fi
          else
            BEFORE="${{ github.event.before }}"
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            if [ -z "$BEFORE" ] \
               || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              # Первый пуш / неизвестная база — сравниваем с пустым деревом
              BASE="$EMPTY_TREE"
            else
              BASE="$BEFORE"
            fi
            # Для каждого изменённого файла берём путь до папки BC-* (на любой глубине)
            CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}" \
              | { grep -oE '(^|.*/)BC-[^/]+' || true; } \
              | sort -u)
          fi

          # Оставляем только реально существующие папки: при переименовании или
          # удалении доклада git diff показывает и старый путь, который деплоить не нужно.
          EXISTING=""
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            if [ -d "$dir" ]; then
              EXISTING="${EXISTING}${dir}"$'\n'
            else
              echo "Пропускаю $dir — папка удалена/переименована."
            fi
          done <<< "$CHANGED"

          echo "Папки к деплою:"
          echo "${EXISTING:-<нет>}"

          FOLDERS=$(printf '%s' "$EXISTING" | { grep -v '^$' || true; } | jq -R . | jq -cs .)
          echo "folders=$FOLDERS" >> "$GITHUB_OUTPUT"

  deploy:
    name: Деплой ${{ matrix.folder }}
    needs: detect-changes
    if: needs.detect-changes.outputs.folders != '' && needs.detect-changes.outputs.folders != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJSON(needs.detect-changes.outputs.folders) }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Публикация на Cloudflare Pages
        run: |
          set -euo pipefail
          NAME=$(basename "${{ matrix.folder }}" | tr '[:upper:]' '[:lower:]')
          echo "Папка ${{ matrix.folder }} → проект $NAME"

          # Создаём проект Pages, если его ещё нет. Для нового доклада это
          # избавляет спикера от ручного `wrangler pages project create`.
          if npx --yes wrangler@4 pages project create "$NAME" --production-branch main; then
            echo "Проект $NAME создан."
          else
            echo "Проект $NAME уже существует — создание пропущено."
          fi

          npx --yes wrangler@4 pages deploy "${{ matrix.folder }}" \
            --project-name="$NAME" \
            --branch=main
