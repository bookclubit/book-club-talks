name: Preview talks (push)

# Обновляет превью доклада на пуш в его ветку BC-*. Триггер push (а не
# pull_request) — чтобы не требовать одобрения maintainer у новых контрибьюторов
# («awaiting approval») и чтобы правки спикера деплоились сами. Первичное превью
# при генерации поднимает generate-talk.yml (пуш бота свои workflow не триггерит).
# Адрес детерминирован: preview.<project>.pages.dev.

on:
  push:
    branches:
      - 'BC-*'
    paths:
      - 'talks/**'

# Один живой превью-деплой на ветку: новый пуш отменяет устаревший.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preview:
    name: Превью ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установить зависимости (wrangler закреплён в package-lock.json)
        run: npm ci

      - name: Preview-деплой на Cloudflare Pages
        uses: ./.github/actions/deploy-preview
        with:
          folder: ${{ github.ref_name }} # ветка BC-* = папка доклада
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
