<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TALK_TITLE}} — {{BOOK_TITLE}}</title>
    <meta name="description" content="{{OG_DESCRIPTION}}">
    <!-- Open Graph / соцсети -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{OG_TITLE}}">
    <meta property="og:description" content="{{OG_DESCRIPTION}}">
    <meta property="og:image" content="{{OG_IMAGE}}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{OG_TITLE}}">
    <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
    <meta name="twitter:image" content="{{OG_IMAGE}}">
    <!-- Локальные шрифты (Inter + JetBrains Mono), без внешних CDN -->
    <link rel="stylesheet" href="assets/css/fonts.css">
    <style>
        :root {
            --bg: #000000;
            --bg-card: #0a0a0a;
            --bg-hover: #171717;
            --border: #333333;
            --border-hover: #444444;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            --accent: #ffffff;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        html, body {
            width: 100%; height: 100%; margin: 0; overflow: hidden;
            background: var(--bg); color: var(--text-main); font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }
        
        .deck-viewport { position: absolute; inset: 0; overflow: hidden; }
        .deck-stage {
            position: absolute; left: 0; top: 0; width: 1920px; height: 1080px;
            transform-origin: 0 0; background: var(--bg);
        }
        .slide {
            position: absolute; inset: 0; display: block; visibility: hidden; opacity: 0;
            pointer-events: none; transition: opacity 0.4s ease;
        }
        .slide.active { visibility: visible; opacity: 1; pointer-events: auto; z-index: 1; }

        h1 { font-size: 88px; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 24px; line-height: 1.1; }
        h2 { font-size: 64px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 32px; }
        h3 { font-size: 32px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 16px; color: var(--accent); }
        p { font-size: 26px; line-height: 1.6; color: var(--text-muted); margin-bottom: 24px; }
        
        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #71717a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .layout-center {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; text-align: center; padding: 0 100px;
        }
        .layout-split {
            display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
            height: 100%; padding: 0 100px; align-items: center;
        }
        .layout-interactive {
            display: grid; grid-template-columns: 55% 45%; gap: 60px;
            height: 100%; padding: 0 80px; align-items: center; align-content: center;
        }

        .badge {
            display: inline-block; padding: 10px 20px; border-radius: 9999px;
            border: 1px solid var(--border); font-size: 18px; font-weight: 500;
            margin-bottom: 40px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;
        }

        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 50px;
        }

        /* Code Viewer */
        .code-panel {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
            overflow: hidden; display: flex; flex-direction: column; height: 100%; max-height: 800px;
        }
        .code-header {
            padding: 20px 30px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            font-family: var(--font-mono); font-size: 14px; color: var(--text-muted);
        }
        .mac-dots { display: flex; gap: 8px; margin-right: 16px; }
        .mac-dot { width: 12px; height: 12px; border-radius: 50%; background: #333; }
        .code-content {
            padding: 20px; overflow-y: auto; flex-grow: 1; font-family: var(--font-mono);
            font-size: 18px; line-height: 1.6; color: #a1a1aa;
        }
        
        /* Custom scrollbar in Vercel style */
        .code-content::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .code-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .code-content::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 4px;
        }
        .code-content::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .code-line {
            padding: 8px 16px; margin: 0 -16px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .code-line:hover { background: #171717; color: #fff; }
        .code-line.active { background: #27272a; color: #fff; border-left-color: #fff; }

        .info-panel {
            background: transparent; border: none;
            padding: 60px; height: 100%; display: flex; flex-direction: column; justify-content: center;
        }
        .info-panel h3 { font-size: 36px; font-weight: 600; margin-bottom: 24px; }
        .info-panel p { font-size: 22px; line-height: 1.8; color: var(--text-muted); }

        .interactive-hint {
            position: absolute; bottom: 40px; left: 80px; font-size: 16px; color: var(--text-muted); opacity: 0.5;
            display: flex; align-items: center; gap: 8px; font-family: var(--font-sans);
        }
        .interactive-hint::before {
            content: 'ℹ'; font-size: 18px;
        }

        /* Tooltip style */
        .tooltip-trigger {
            position: relative;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px dashed #ffffff;
            transition: border-color 0.2s;
            display: inline-block;
        }
        .tooltip-trigger:hover {
            border-bottom-color: #a1a1aa;
        }
        .tooltip-content {
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 22px;
            width: 480px;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text-muted);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
            text-align: left;
            visibility: hidden;
        }
        /* Keep tooltip open when hovering trigger or the tooltip itself */
        .tooltip-trigger:hover .tooltip-content,
        .tooltip-content:hover {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        /* Bridge to allow smooth hover transition */
        .tooltip-content::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 35px;
            background: transparent;
        }
        /* Style for links inside the tooltip */
        .tooltip-content a {
            color: #ffffff;
            text-decoration: underline;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .tooltip-content a:hover {
            color: #a1a1aa;
        }

        /* Syntax */
        .s-kw { color: #f87171; } /* keyword */
        .s-str { color: #34d399; } /* string */
        .s-com { color: #52525b; } /* comment */
        .s-var { color: #60a5fa; } /* variable */
        .s-key { color: #e879f9; } /* yaml key */

        .repo-link {
            position: fixed; top: 40px; right: 40px; padding: 14px 28px;
            background: transparent; border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-muted); text-decoration: none; font-size: 16px;
            transition: all 0.2s; z-index: 100; font-weight: 500; font-family: var(--font-sans);
        }
        .repo-link:hover { border-color: #fff; color: #fff; }

        .progress {
            position: fixed; top: 0; left: 0; height: 2px; background: #fff; z-index: 1000;
            transition: width 0.3s ease;
        }

        /* Flat Icon Styling */
        .flat-icon {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: inline-block;
        }

        /* Slide 7 Clickable Cards and Tooltips */
        .build-service-card {
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, background-color 0.2s;
        }
        .build-service-card:hover {
            border-color: #555;
            background-color: #111;
        }
        .build-service-card.active-card {
            border-color: #fff;
            background-color: #171717;
        }

        .build-controller {
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, background-color 0.2s;
        }
        .build-controller:hover {
            border-color: #fff;
            background-color: #0c0c0c;
        }
        .build-controller.active-card {
            border-color: #fff;
            background-color: #111;
        }

        .build-tooltip {
            position: absolute;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 16px;
            width: 380px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px) translateX(-50%);
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .build-tooltip.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) translateX(-50%);
        }

        .build-tooltip::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            z-index: 1;
        }

        .build-tooltip-above {
            bottom: 515px;
        }
        .build-tooltip-above::after {
            bottom: -6px;
            left: calc(50% - 5px);
            transform: rotate(45deg);
            border-top: none;
            border-left: none;
        }

        .build-tooltip-below {
            top: 505px;
        }
        .build-tooltip-below::after {
            top: -6px;
            left: calc(50% - 5px);
            transform: rotate(45deg);
            border-bottom: none;
            border-right: none;
        }

        .tooltip-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .tooltip-tab {
            background: transparent;
            border: none;
            color: #666;
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .tooltip-tab:hover {
            color: #fff;
        }
        .tooltip-tab.active {
            color: #fff;
            background: #222;
        }
        
        .tooltip-header {
            font-family: var(--font-mono);
            font-size: 13px;
            color: #fff;
            border-bottom: 1px solid #222;
            padding-bottom: 8px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .tooltip-tab-content {
            display: none;
        }
        .tooltip-tab-content.active {
            display: block;
        }
        .tooltip-tab-content pre {
            margin: 0;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.5;
            color: #a1a1aa;
            overflow-x: auto;
        }

        /* Left Aspect Diagram for Slides 14 & 15 */
        .arch-container-left {
            display: flex;
            flex-direction: column;
            width: 280px;
            gap: 12px;
            margin-left: 0px;
        }
        .arch-aspect-stack-left {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .arch-aspect-card-left {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            text-align: center;
            opacity: 0.25;
            transition: all 0.3s ease;
        }
        .arch-aspect-card-left.card-app-left {
            padding: 10px 12px;
            font-size: 15px;
            font-weight: 600;
        }
        .arch-aspect-card-left.active-highlight {
            opacity: 1;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.6);
            color: #fff;
            font-weight: 600;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        .acc-link {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.35);
            transition: all 0.2s ease;
            position: relative;
        }
        .acc-link:hover {
            color: #fff;
            border-bottom-color: #fff;
        }
        .acc-link[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #e4e4e7;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.5;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            white-space: normal;
            width: 280px;
            z-index: 1000;
            pointer-events: none;
            animation: tooltipFadeIn 0.2s ease;
        }
        .acc-link[data-tooltip]:hover::before {
            content: '';
            position: absolute;
            bottom: calc(100% + 4px);
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(255, 255, 255, 0.15);
            z-index: 1001;
            pointer-events: none;
            animation: tooltipFadeIn 0.2s ease;
        }
        @keyframes tooltipFadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(4px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="progress" id="progressBar" style="width: 0%"></div>

    <div class="deck-viewport">
        <main class="deck-stage" id="deckStage">
            
            <!-- SLIDE 1 (Copy of Slide 1) -->
            <section class="slide" data-slide="1">
                <div class="layout-center">
                    <div class="badge">{{CHAPTER_LABEL}}</div>
                    <h1 class="gradient-text">{{TALK_TITLE}}</h1>
                </div>
            </section>

            <!-- SLIDE 2 (Copy of Slide 2) -->
            <!-- SLIDE 2: ABOUT THE BOOK & AUTHORS -->
            <section class="slide" data-slide="2">
                <style>
                    .about-book-slide {
                        display: flex;
                        flex-direction: column;
                        gap: 36px;
                        align-items: center;
                        justify-content: center;
                        height: 100%;
                        padding: 40px 100px;
                        box-sizing: border-box;
                    }
                    .book-container {
                        display: flex;
                        flex-direction: column;
                        width: 100%;
                        max-width: 1200px;
                    }
                    .book-row {
                        display: flex;
                        gap: 40px;
                        align-items: center;
                        padding: 12px 0;
                    }
                    .book-cover-container {
                        flex-shrink: 0;
                    }
                    .book-cover {
                        width: 200px;
                        height: auto;
                        border-radius: 8px;
                        box-shadow: 0 15px 30px rgba(0,0,0,0.6);
                        transition: transform 0.3s ease;
                    }
                    .book-cover:hover {
                        transform: scale(1.05);
                    }
                    .book-text-info {
                        display: flex;
                        flex-direction: column;
                        text-align: left;
                    }
                    .book-link {
                        font-size: 32px;
                        font-weight: 700;
                        line-height: 1.2;
                        color: #fff;
                        text-decoration: none;
                        margin-bottom: 6px;
                        transition: color 0.2s;
                        letter-spacing: -0.02em;
                    }
                    .book-link:hover {
                        color: var(--text-muted);
                    }
                    .book-subtitle {
                        font-size: 16px;
                        line-height: 1.4;
                        color: var(--text-muted);
                        margin: 0 0 12px 0;
                        font-weight: 500;
                    }
                    .book-desc-ru {
                        font-size: 15px;
                        line-height: 1.6;
                        color: #888;
                        margin: 0;
                    }
                    .people-section {
                        display: grid;
                        grid-template-columns: 1fr 1fr;
                        gap: 40px;
                        width: 100%;
                        max-width: 1200px;
                    }
                    .authors-column {
                        display: flex;
                        flex-direction: column;
                    }
                    .authors-grid {
                        display: flex;
                        flex-direction: column;
                        gap: 16px;
                    }
                    .speaker-column {
                        display: flex;
                        flex-direction: column;
                    }
                    .author-card {
                        display: flex;
                        align-items: center;
                        gap: 20px;
                        background: var(--bg-card);
                        border: 1px solid var(--border);
                        border-radius: 16px;
                        padding: 16px;
                        transition: border-color 0.2s, background-color 0.2s;
                        text-decoration: none;
                        color: inherit;
                        height: 96px;
                        box-sizing: border-box;
                    }
                    .author-card:hover {
                        border-color: #555;
                        background: #0f0f0f;
                    }
                    .author-avatar {
                        width: 60px;
                        height: 60px;
                        border-radius: 50%;
                        border: 2px solid #333;
                        object-fit: cover;
                    }
                    .author-info {
                        display: flex;
                        flex-direction: column;
                        text-align: left;
                    }
                    .author-name {
                        font-size: 18px;
                        font-weight: 600;
                        color: #fff;
                        margin-bottom: 4px;
                    }
                    .author-link-text {
                        font-size: 13px;
                        color: var(--text-muted);
                        font-family: var(--font-mono);
                    }
                </style>
                <div class="about-book-slide">
                    <!-- Book block -->
                    <div class="book-container">
                        <div class="badge" style="align-self: flex-start; margin-bottom: 12px;">Книга</div>
                        <div class="book-row">
                            <div class="book-cover-container">
                                <a href="{{BOOK_URL}}" target="_blank">
                                    <img class="book-cover" src="assets/cover/{{BOOK_COVER_FILE}}" alt="{{BOOK_TITLE}}">
                                </a>
                            </div>
                            <div class="book-text-info">
                                <a class="book-link" href="{{BOOK_URL}}" target="_blank">
                                    {{BOOK_TITLE}}
                                </a>
                                <p class="book-subtitle">
                                    {{BOOK_SUBTITLE}}
                                </p>
                                <p class="book-desc-ru">
                                    {{BOOK_DESC}}
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- People block in two columns -->
                    <div class="people-section">
                        <div class="authors-column">
                            <div class="badge" style="align-self: flex-start; margin-bottom: 12px;">{{AUTHORS_BADGE}}</div>
                            <div class="authors-grid">
                                <!--AUTHOR_CARDS-->
                            </div>
                        </div>
                        <div class="speaker-column">
                            <div class="badge" style="align-self: flex-start; margin-bottom: 12px;">Спикер</div>
                            <!--SPEAKER_CARD-->
                        </div>
                    </div>
                </div>
            </section>

            <!-- SLIDE 3 (Copy of Slide 3) -->
            <section class="slide" data-slide="3">
                <style>
                    .timeline-next-container {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        height: 100%;
                        padding: 0 100px;
                    }
                    .timeline-next {
                        display: flex;
                        flex-direction: column;
                        gap: 36px;
                        position: relative;
                        width: 100%;
                        max-width: 850px;
                        margin-top: 20px;
                        padding-left: 60px;
                        box-sizing: border-box;
                    }
                    .timeline-next::before {
                        content: '';
                        position: absolute;
                        left: 21px;
                        top: 20px;
                        bottom: 20px;
                        width: 2px;
                        background: #222;
                    }
                    .timeline-next-item {
                        display: flex;
                        gap: 24px;
                        align-items: flex-start;
                        position: relative;
                    }
                    .timeline-next-marker {
                        width: 14px;
                        height: 14px;
                        border-radius: 50%;
                        background: #000;
                        border: 2px solid #333;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        flex-shrink: 0;
                        position: absolute;
                        left: -46px;
                        top: 15px;
                        z-index: 2;
                        box-sizing: border-box;
                    }
                    .timeline-next-marker.completed {
                        width: 20px;
                        height: 20px;
                        left: -49px;
                        top: 12px;
                        border-color: #555;
                        background: #000;
                        color: #555;
                    }
                    .timeline-next-content {
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        text-align: left;
                    }
                    .timeline-next-title {
                        font-size: 28px;
                        font-weight: 500;
                        color: var(--text-muted);
                        display: flex;
                        align-items: center;
                        gap: 16px;
                    }
                    .timeline-next-item.completed .timeline-next-title {
                        color: #555;
                        font-size: 32px;
                        font-weight: 500;
                    }
                    .timeline-next-item.next-large .timeline-next-title {
                        font-size: 44px;
                        font-weight: 600;
                        color: #fff;
                    }
                    .timeline-next-speaker {
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        margin-top: 10px;
                    }
                    .timeline-next-speaker-avatar {
                        width: 32px;
                        height: 32px;
                        border-radius: 50%;
                        border: 1px solid #444;
                        object-fit: cover;
                        background: #111;
                    }
                    .timeline-next-speaker-name {
                        font-size: 18px;
                        font-weight: 500;
                        color: #a1a1aa;
                    }
                    .timeline-badge-completed {
                        font-size: 13px;
                        font-weight: 600;
                        color: #555;
                        border: 1px solid #333;
                        padding: 2px 8px;
                        border-radius: 4px;
                        text-transform: uppercase;
                        letter-spacing: 0.05em;
                        text-decoration: none;
                        display: inline-block;
                    }
                </style>
                <div class="timeline-next-container">
                    <h2 class="gradient-text" style="font-size: 64px; margin-bottom: 40px; line-height: 1;">Программа вечера</h2>
                    <div class="timeline-next">
                        <!--AGENDA_ITEMS-->
                    </div>
                </div>
            </section>
            <section class="slide" data-slide="4">
                <style>
                    .timeline-next-container {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        height: 100%;
                        padding: 0 100px;
                    }
                    .timeline-next {

    </div>

    


<script>
        window.peeledCount = 0;

        class Presentation {
            constructor() {
                this.slides = document.querySelectorAll('.slide');
                this.current = 0;
                this.stage = document.getElementById('deckStage');
                this.progressBar = document.getElementById('progressBar');
                
                this.scaleStage();
                window.addEventListener('resize', () => this.scaleStage());
                
                document.addEventListener('keydown', (e) => {
                    if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); this.next(); }
                    if(e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); this.prev(); }
                });
  
                this.setupInteractiveBlocks();
                this.setupDiagramTooltips();
                this.setupBeforeAfterSlider();
                this.setupCollapsibleCompose();
                this.setupPillarsAccordion();
                this.setupTakeawaysDrag();
                this.showSlide(0);
            }

            setupCollapsibleCompose() {
                const wrapper = document.querySelector('.col-compose-wrapper');
                const btn = document.querySelector('.collapse-btn');
                
                if (wrapper && btn) {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        wrapper.classList.toggle('collapsed');
                    });
                }
            }

            setupBeforeAfterSlider() {
                const rangeInput = document.getElementById('sliderRangeInput');
                const beforeContainer = document.getElementById('sliderBeforeContainer');
                const beforeText = document.getElementById('sliderBeforeText');
                const afterText = document.getElementById('sliderAfterText');
                const handle = document.getElementById('sliderHandle');
                
                if (rangeInput && beforeContainer && handle && beforeText && afterText) {
                    const updateSlider = () => {
                        const val = rangeInput.value;
                        beforeContainer.style.width = `${val}%`;
                        handle.style.left = `${val}%`;
                        
                        // Calculate opacities
                        const beforeOpacity = val / 100;
                        const afterOpacity = 1 - beforeOpacity;
                        beforeText.style.opacity = beforeOpacity;
                        afterText.style.opacity = afterOpacity;
                        
                        // Dynamically update pointer-events so tooltips/links are interactive
                        beforeText.style.pointerEvents = beforeOpacity > 0.5 ? 'auto' : 'none';
                        afterText.style.pointerEvents = afterOpacity > 0.5 ? 'auto' : 'none';
                    };
                    rangeInput.addEventListener('input', updateSlider);
                    updateSlider(); // Initial run on load
                }
            }

            setupDiagramTooltips() {
                document.querySelectorAll('.build-service-card, .build-controller').forEach(card => {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        
                        let targetId = '';
                        if (card.classList.contains('build-card-frontend')) targetId = 'tooltip-frontend';
                        else if (card.classList.contains('build-card-backend')) targetId = 'tooltip-backend';
                        else if (card.classList.contains('build-card-db')) targetId = 'tooltip-db';
                        else if (card.classList.contains('build-controller')) targetId = 'tooltip-orchestrator';
                        
                        const targetTooltip = document.getElementById(targetId);
                        const isActive = targetTooltip.classList.contains('active');
                        
                        // Close all tooltips & deactivate cards
                        document.querySelectorAll('.build-tooltip').forEach(t => t.classList.remove('active'));
                        document.querySelectorAll('.build-service-card, .build-controller').forEach(c => c.classList.remove('active-card'));
                        
                        // Toggle active state
                        if (!isActive) {
                            targetTooltip.classList.add('active');
                            card.classList.add('active-card');
                        }
                    });
                });

                // Close tooltips on click outside
                document.addEventListener('click', () => {
                    document.querySelectorAll('.build-tooltip').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.build-service-card, .build-controller').forEach(c => c.classList.remove('active-card'));
                });

                // Prevent closing when clicking inside tooltip
                document.querySelectorAll('.build-tooltip').forEach(tooltip => {
                    tooltip.addEventListener('click', (e) => {
                        e.stopPropagation();
                    });
                });

                // Tab switching
                document.querySelectorAll('.tooltip-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        const container = tab.closest('.build-tooltip');
                        const tabName = tab.getAttribute('data-tab');
                        
                        container.querySelectorAll('.tooltip-tab').forEach(t => t.classList.remove('active'));
                        container.querySelectorAll('.tooltip-tab-content').forEach(c => c.classList.remove('active'));
                        
                        tab.classList.add('active');
                        container.querySelector(`.tooltip-tab-content[data-content="${tabName}"]`).classList.add('active');
                    });
                });
            }

            scaleStage() {
                const factor = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
                const x = (window.innerWidth - 1920 * factor) / 2;
                const y = (window.innerHeight - 1080 * factor) / 2;
                this.stage.style.transform = `translate(${x}px, ${y}px) scale(${factor})`;
            }

            showSlide(idx) {
                this.slides[this.current].classList.remove('active');
                this.current = Math.max(0, Math.min(idx, this.slides.length - 1));
                this.slides[this.current].classList.add('active');
                this.progressBar.style.width = `${((this.current + 1) / this.slides.length) * 100}%`;
                
                // Reset Slide 8 peel covers when entering the slide
                if (this.current === 7) {
                    document.querySelectorAll('.peel-cover').forEach(c => c.classList.remove('peeled'));
                    const card = document.getElementById('mainTakeawayCard');
                    if (card) card.classList.remove('revealed');
                    window.peeledCount = 0;
                }
            }

            next() { this.showSlide(this.current + 1); }
            prev() { this.showSlide(this.current - 1); }

            setupInteractiveBlocks() {
                document.querySelectorAll('.interactive-block').forEach(block => {
                    const targetId = block.getAttribute('data-target');
                    const targetPanel = document.getElementById(targetId);
                    
                    block.querySelectorAll('.code-line').forEach(line => {
                        line.addEventListener('click', () => {
                            // Reset active classes inside this block
                            block.querySelectorAll('.code-line').forEach(l => l.classList.remove('active'));
                            line.classList.add('active');
                            
                            const title = line.getAttribute('data-title');
                            const desc = line.getAttribute('data-desc');
                            
                            // Update info panel
                            targetPanel.innerHTML = `
                                <h3>${title}</h3>
                                <p>${desc}</p>
                            `;
                            
                            // Slight animation
                            targetPanel.style.opacity = '0';
                            targetPanel.style.transform = 'translateY(10px)';
                            setTimeout(() => {
                                targetPanel.style.transition = 'all 0.3s ease';
                                targetPanel.style.opacity = '1';
                                targetPanel.style.transform = 'translateY(0)';
                            }, 50);
                        });
                    });
                });
            }

            setupPillarsAccordion() {
                const container = document.querySelector('.pillars-container');
                if (!container) return;
                
                const cards = container.querySelectorAll('.pillar-card');
                
                cards.forEach(card => {
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isExpanded = card.classList.contains('expanded');
                        
                        // Reset all cards
                        cards.forEach(c => {
                            c.classList.remove('expanded');
                            c.classList.remove('collapsed');
                        });
                        
                        if (!isExpanded) {
                            // Expand clicked card, collapse others
                            card.classList.add('expanded');
                            cards.forEach(c => {
                                if (c !== card) {
                                    c.classList.add('collapsed');
                                }
                            });
                        }
                    });
                });
                
                // Clicking outside container resets all cards
                document.addEventListener('click', () => {
                    cards.forEach(c => {
                        c.classList.remove('expanded');
                        c.classList.remove('collapsed');
                    });
                });
            }

            setupTakeawaysDrag() {
                const container = document.querySelector('.peel-container');
                if (!container) return;
                
                const covers = container.querySelectorAll('.peel-cover');
                
                covers.forEach(cover => {
                    const fold = cover.querySelector('.peel-fold');
                    if (!fold) return;
                    
                    let startX = 0;
                    let startY = 0;
                    let isDragging = false;
                    
                    const onMouseDown = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        if (e.type === 'mousedown' && e.button !== 0) return;
                        
                        isDragging = true;
                        
                        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                        
                        startX = clientX;
                        startY = clientY;
                        
                        cover.style.transition = 'none';
                        fold.style.cursor = 'grabbing';
                        document.body.style.cursor = 'grabbing';
                        
                        const onMouseMove = (moveEvent) => {
                            if (!isDragging) return;
                            
                            const moveX = moveEvent.type === 'touchmove' ? moveEvent.touches[0].clientX : moveEvent.clientX;
                            const moveY = moveEvent.type === 'touchmove' ? moveEvent.touches[0].clientY : moveEvent.clientY;
                            
                            const dx = moveX - startX;
                            const dy = moveY - startY;
                            
                            const activeX = Math.max(0, dx);
                            const activeY = Math.max(0, dy);
                            
                            if (activeX > 0 || activeY > 0) {
                                // 3D rotate around axis (1, -1, 0)
                                const angle = Math.min(115, activeX / 1.5);
                                cover.style.transform = `rotate3d(1, -1, 0, ${angle}deg) translate(${activeX * 0.3}px, -${activeY * 0.3}px) scale(${Math.max(0.2, 1 - activeX / 600)})`;
                                cover.style.opacity = `${Math.max(0.1, 1 - activeX / 500)}`;
                            }
                        };
                        
                        const onMouseUp = (upEvent) => {
                            isDragging = false;
                            fold.style.cursor = 'grab';
                            document.body.style.cursor = '';
                            
                            document.removeEventListener('mousemove', onMouseMove);
                            document.removeEventListener('mouseup', onMouseUp);
                            document.removeEventListener('touchmove', onMouseMove);
                            document.removeEventListener('touchend', onMouseUp);
                            
                            const clientXEnd = upEvent.type === 'touchend' ? upEvent.changedTouches[0].clientX : upEvent.clientX;
                            const dx = clientXEnd - startX;
                            
                            if (dx > 120) {
                                // Reset inline styles so CSS .peeled classes take effect
                                cover.style.transform = '';
                                cover.style.opacity = '';
                                cover.style.transition = '';
                                cover.classList.add('peeled');
                                
                                window.peeledCount++;
                                if (window.peeledCount === 5) {
                                    const card = document.getElementById('mainTakeawayCard');
                                    if (card) {
                                        setTimeout(() => {
                                            card.classList.add('revealed');
                                        }, 400);
                                    }
                                }
                            } else {
                                cover.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                                cover.style.transform = '';
                                cover.style.opacity = '';
                            }
                        };
                        
                        document.addEventListener('mousemove', onMouseMove);
                        document.addEventListener('mouseup', onMouseUp);
                        document.addEventListener('touchmove', onMouseMove, { passive: false });
                        document.addEventListener('touchend', onMouseUp);
                    };
                    
                    fold.addEventListener('mousedown', onMouseDown);
                    fold.addEventListener('touchstart', onMouseDown, { passive: false });
                });
            }
        }

        new Presentation();
    </script>
</body>
</html>
