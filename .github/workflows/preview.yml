name: Preview talks (push)

# Обновляет превью доклада на пуш в его ветку BC-*. Триггер push (а не
# pull_request) — чтобы не требовать одобрения maintainer у новых контрибьюторов
# («awaiting approval») и чтобы правки спикера деплоились сами. Первичное превью
# при генерации поднимает generate-talk.yml (пуш бота свои workflow не триггерит).
# Адрес детерминирован: preview.<project>.pages.dev.

on:
  push:
    branches:
      - 'BC-*'
    paths:
      - 'talks/**'

permissions:
  contents: read

jobs:
  preview:
    name: Превью ${{ github.ref_name }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Preview-деплой на Cloudflare Pages
        run: |
          set -euo pipefail
          FOLDER="${GITHUB_REF_NAME}"           # ветка BC-* = папка доклада
          if [ ! -d "talks/$FOLDER" ]; then
            echo "Папки talks/$FOLDER нет — пропускаю превью."; exit 0
          fi
          NAME=$(echo "$FOLDER" | tr '[:upper:]' '[:lower:]')
          # проект создаётся сам, если его ещё нет (идемпотентно)
          npx --yes wrangler@4 pages project create "$NAME" --production-branch main \
            || echo "Проект $NAME уже существует."
          # фиксированная ветка preview → стабильный алиас preview.<project>.pages.dev
          npx --yes wrangler@4 pages deploy "talks/$FOLDER" \
            --project-name="$NAME" --branch="preview"
          echo "🔎 Превью обновлено: https://preview.$NAME.pages.dev"
