name: CI

# Триггер push (main + ветки докладов BC-*), без pull_request — чтобы у новых
# контрибьюторов не требовалось одобрение maintainer («awaiting approval»).
# Lint автономности всё равно гоняется на каждую ветку доклада перед мержем.
on:
  push:
    branches: [main, 'BC-*']

permissions:
  contents: read

jobs:
  lint:
    name: Проверка автономности докладов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Lint talks
        run: node scripts/lint-talks.mjs
